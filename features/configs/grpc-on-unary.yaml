name: blog-features-grpc-on-unary
image_uri: anyscale/ray-llm:nightly-py311-cu128
cloud: anyscale_v2_default_cloud
compute_config:
  cloud: anyscale_v2_default_cloud
  head_node:
    instance_type: m8a.xlarge
  worker_nodes:
    - instance_type: m7a.4xlarge
      min_nodes: 1
      max_nodes: 1
env_vars:
  RAY_SERVE_USE_GRPC_BY_DEFAULT: "1"
applications:
  - name: default
    route_prefix: /
    runtime_env:
      working_dir: ../../unary_app/
    import_path: fastapi_dep:entrypoint
    deployments:
      - name: Echo
        max_ongoing_requests: 100000
        num_replicas: 1
      - name: ASGIIngressDeployment
        max_ongoing_requests: 100000
        num_replicas: 1
